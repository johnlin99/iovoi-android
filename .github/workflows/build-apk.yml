name: Build iovoi APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 取得程式碼
        uses: actions/checkout@v4

      - name: ☕️ 設定 Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🐘 安裝並執行 Gradle (自動管理 Wrapper)
        uses: gradle/actions/setup-gradle@v3
        with:
           gradle-version: '8.0' # 明確指定我們要的版本

      - name: 🏗️ 開始編譯 iovoi APK
        run: gradle assembleDebug --stacktrace --info

      - name: 📦 上傳 APK 檔案
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iovoi-keyboard-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
